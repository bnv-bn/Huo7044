<section class="comment-section" style="padding: 40px 20px; max-width: 900px; margin: 0 auto;">
    <div class="content-card" style="border-left: 8px solid #fdbb2d;">
        <h3 style="color:#1a2a6c; margin-bottom:15px;">💬 ส่งความคิดเห็นถึงสภานักเรียน</h3>
        <form id="discordForm">
            <input type="text" id="senderName" placeholder="ชื่อของคุณ" required 
                style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-family: 'Kanit';">
            <textarea id="senderMsg" rows="4" placeholder="พิมพ์ข้อความที่นี่..." required
                style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-family: 'Kanit'; resize: none;"></textarea>
            <button type="submit" id="submitBtn" 
                style="background: #1a2a6c; color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s;">
                ส่งข้อความ
            </button>
        </form>
        <p id="statusMsg" style="margin-top: 10px; text-align: center; font-size: 0.9rem; display: none;"></p>
    </div>
</section>

<script>
    document.getElementById('discordForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const webhookURL = "https://discord.com/api/webhooks/1485616498033692836/N60AQBtnrXNlI1-pSeiHLxBKN7wPzt3Xj3BIlHC5c-pg5CZ75gcL-DEWGDGyVMwHL-kF"; // <--- เอา URL ที่ก๊อปมาจาก Discord มาวางตรงนี้
        const name = document.getElementById('senderName').value;
        const message = document.getElementById('senderMsg').value;
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusMsg');

        // ป้องกันการกดซ้ำ
        btn.disabled = true;
        btn.innerText = "กำลังส่ง...";

        const data = {
            username: "ระบบแจ้งเตือนสภานักเรียน",
            embeds: [{
                title: "📌 มีความคิดเห็นใหม่จากเว็บไซต์",
                color: 16759597, // สีส้มทอง
                fields: [
                    { name: "👤 ผู้ส่ง", value: name, inline: true },
                    { name: "💬 ข้อความ", value: message }
                ],
                footer: { text: "ส่งจากเว็บไซต์สภานักเรียนบ้านทุ่มทุ่มฯ" },
                timestamp: new Date()
            }]
        };

        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (response.ok) {
                status.style.display = "block";
                status.style.color = "green";
                status.innerText = "✅ ส่งข้อมูลเรียบร้อยแล้ว!";
                document.getElementById('discordForm').reset();
            } else {
                throw new Error();
            }
        })
        .catch(err => {
            status.style.display = "block";
            status.style.color = "red";
            status.innerText = "❌ เกิดข้อผิดพลาด กรุณาลองใหม่";
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "ส่งข้อความ";
            setTimeout(() => { status.style.display = "none"; }, 5000);
        });
    });
                     </script>
