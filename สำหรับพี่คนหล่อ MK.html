<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Ultimate Control - Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: #0b0e14; color: white; min-height: 100vh; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
        
        .container { width: 100%; max-width: 550px; }
        .card { background: #1a1c23; padding: 25px; border-radius: 20px; border: 2px solid #e94560; box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2); margin-bottom: 20px; }
        
        /* Tab System */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #2d313d; color: #94a3b8; cursor: pointer; border-radius: 10px; transition: 0.3s; font-weight: bold; }
        .tab-btn.active { background: #e94560; color: white; }

        h2 { text-align: center; color: #e94560; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #e94560; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
        .btn-main { background: #e94560; width: 100%; font-size: 16px; }
        .btn-blue { background: #3b82f6; }
        .btn-red { background: #ef4444; }
        button:hover:not(:disabled) { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { background: #444; cursor: not-allowed; }

        #log { background: #000; padding: 15px; border-radius: 10px; font-size: 12px; height: 180px; overflow-y: auto; color: #00ff00; font-family: monospace; border: 1px solid #333; margin-top: 10px; }
        .section-title { border-left: 4px solid #e94560; padding-left: 10px; margin: 20px 0 10px 0; color: #e94560; font-size: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('webhook-tab')">🚀 Webhook Spammer</button>
        <button class="tab-btn" onclick="switchTab('bot-tab')">🛠️ Bot Manager</button>
    </div>

    <!-- Webhook Tab -->
    <div id="webhook-tab" class="tab-content">
        <div class="card">
            <h2>ค่ายhumk😈🫟</h2>
            <div class="input-group">
                <label>🔗 Webhook URL</label>
                <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
            </div>
            <div class="input-group">
                <label>💬 ข้อความ</label>
                <textarea id="msg" rows="2" placeholder="ใส่ข้อความที่จะส่ง..."></textarea>
            </div>
            <div class="input-group">
                <label>🖼️ ลิงก์รูปภาพ (คั่นด้วย , เพื่อสุ่ม)</label>
                <input type="text" id="imgUrl" placeholder="https://image.com/pic.png">
            </div>
            <div class="row">
                <div class="input-group">
                    <label>🔢 จำนวน (รอบ)</label>
                    <input type="number" id="amt" value="10">
                </div>
                <div class="input-group">
                    <label>⏱️ ดีเลย์ (ms)</label>
                    <input type="number" id="delay" value="1000">
                </div>
            </div>
            <button class="btn-main" id="runWebhook" onclick="fireWebhook()">🚀 เริ่มทำงาน</button>
        </div>
    </div>

    <!-- Bot Tab -->
    <div id="bot-tab" class="tab-content hidden">
        <div class="card">
            <h2>🤖 Bot Control</h2>
            <div class="input-group">
                <label>🔑 Bot Token</label>
                <input type="password" id="botToken" placeholder="MTAx...">
            </div>
            <div class="input-group">
                <label>🆔 Guild ID (ไอดีเซิร์ฟเวอร์)</label>
                <input type="text" id="guildId">
            </div>

            <div class="section-title">📺 Channel Management</div>
            <div class="input-group">
                <label>Channel ID</label>
                <input type="text" id="targetChannel">
            </div>
            <div class="input-group">
                <label>ชื่อใหม่</label>
                <input type="text" id="newChannelName" placeholder="hacked-channel">
            </div>
            <div class="btn-grid">
                <button class="btn-blue" onclick="botAction('renameChannel')">✏️ เปลี่ยนชื่อช่อง</button>
                <button class="btn-red" onclick="botAction('deleteChannel')">🗑️ ลบช่องทิ้ง</button>
            </div>

            <div class="section-title">👤 Member Management</div>
            <div class="input-group">
                <label>User ID (ที่จะเตะ)</label>
                <input type="text" id="targetUser">
            </div>
            <button class="btn-red" style="width: 100%;" onclick="botAction('kickUser')">👢 Kick Member</button>
        </div>
    </div>

    <div id="log">สถานะ: รอการสั่งการ...</div>
</div>

<script>
    // --- Tab System ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }

    const logBox = document.getElementById('log');
    function addLog(msg) {
        logBox.innerHTML += `${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // --- Webhook Logic ---
    async function fireWebhook() {
        const url = document.getElementById('webhookUrl').value;
        const msg = document.getElementById('msg').value;
        const imgInput = document.getElementById('imgUrl').value;
        const amt = parseInt(document.getElementById('amt').value);
        const delay = parseInt(document.getElementById('delay').value);
        const btn = document.getElementById('runWebhook');

        if (!url) return alert("ใส่ Webhook URL ก่อนพี่ชาย!");
        
        btn.disabled = true;
        addLog("🏁 เริ่มส่ง Webhook...");

        const imgList = imgInput.split(',').map(s => s.trim()).filter(s => s !== "");

        for (let i = 1; i <= amt; i++) {
            const payload = { content: msg };
            if (imgList.length > 0) {
                const randomImg = imgList[Math.floor(Math.random() * imgList.length)];
                payload.embeds = [{ image: { url: randomImg } }];
            }

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    addLog(`✅ ส่งแล้ว [${i}/${amt}]`);
                } else if (res.status === 429) {
                    const data = await res.json();
                    addLog(`⚠️ ติด Rate Limit! รอ ${data.retry_after}ms`);
                    await new Promise(r => setTimeout(r, data.retry_after));
                } else {
                    addLog(`❌ ข้อผิดพลาด: ${res.status}`);
                }
            } catch (e) {
                addLog(`❌ เชื่อมต่อล้มเหลว`);
            }
            await new Promise(r => setTimeout(r, delay));
        }
        addLog("✨ เสร็จสิ้น!");
        btn.disabled = false;
    }

    // --- Bot Logic ---
    async function botAction(type) {
        const token = document.getElementById('botToken').value;
        const gId = document.getElementById('guildId').value;
        const cId = document.getElementById('targetChannel').value;
        const uId = document.getElementById('targetUser').value;
        const newName = document.getElementById('newChannelName').value;

        if (!token) return alert("ใส่ Bot Token ด้วยครับ!");

        let endpoint = "";
        let method = "GET";
        let body = null;

        switch(type) {
            case 'renameChannel':
                endpoint = `/channels/${cId}`;
                method = 'PATCH';
                body = { name: newName };
                break;
            case 'deleteChannel':
                if(!confirm("ลบจริงหรอ?")) return;
                endpoint = `/channels/${cId}`;
                method = 'DELETE';
                break;
            case 'kickUser':
                endpoint = `/guilds/${gId}/members/${uId}`;
                method = 'DELETE';
                break;
        }

        try {
            const res = await fetch(`https://discord.com/api/v10${endpoint}`, {
                method: method,
                headers: {
                    'Authorization': `Bot ${token}`,
                    'Content-Type': 'application/json'
                },
                body: body ? JSON.stringify(body) : null
            });

            if (res.ok) {
                addLog(`✅ Bot ทำการ ${type} สำเร็จ!`);
            } else {
                const err = await res.json();
                addLog(`❌ Bot พลาด: ${err.message}`);
            }
        } catch (e) {
            addLog(`❌ เชื่อมต่อ Discord API ไม่ได้`);
        }
    }
</script>

</body>
</html>
